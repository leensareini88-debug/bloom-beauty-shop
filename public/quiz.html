<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom Beauty - Skin Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .quiz-hero {
      background: var(--blush);
      text-align: center;
      padding: 60px 5%;
    }

    .quiz-hero h1 {
      font-family: var(--font-serif);
      font-size: 36px;
      color: var(--dark);
      margin: 12px 0;
    }

    .quiz-hero p {
      color: var(--gray-text);
      font-size: 14px;
      max-width: 480px;
      margin: 0 auto;
    }

    .quiz-container {
      max-width: 680px;
      margin: -40px auto 80px;
      background: var(--white);
      border-radius: 20px;
      padding: 48px;
      box-shadow: var(--shadow-soft);
      position: relative;
    }

    .quiz-progress-label {
      text-align: center;
      font-size: 12px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--gray-text);
      margin-bottom: 12px;
    }

    .quiz-progress-bar {
      height: 6px;
      background: var(--gray-light);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 36px;
    }

    .quiz-progress-fill {
      height: 100%;
      width: 20%;
      background: var(--mauve);
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    .quiz-question {
      display: none;
    }

    .quiz-question.active {
      display: block;
      animation: quizSlideIn 0.4s ease;
    }

    @keyframes quizSlideIn {
      from {
        opacity: 0;
        transform: translateX(40px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .quiz-question h2 {
      font-family: var(--font-serif);
      font-size: 24px;
      color: var(--dark);
      text-align: center;
      margin-bottom: 28px;
    }

    .quiz-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media (max-width: 600px) {
      .quiz-options {
        grid-template-columns: 1fr;
      }
    }

    .quiz-option {
      border: 1.5px solid var(--rose);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
    }

    .quiz-option:hover {
      border-color: var(--mauve);
      background: var(--blush);
    }

    .quiz-option.selected {
      border-color: var(--dark);
      background: var(--cream);
    }

    .quiz-option-emoji {
      font-size: 24px;
      flex-shrink: 0;
    }

    .quiz-option-text {
      font-size: 13px;
      color: var(--dark);
    }

    .quiz-option-text strong {
      display: block;
      font-size: 14px;
      margin-bottom: 2px;
    }

    .quiz-option-check {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--dark);
      font-size: 16px;
      display: none;
    }

    .quiz-option.selected .quiz-option-check {
      display: inline;
    }

    .quiz-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 36px;
    }

    .quiz-back-btn {
      background: none;
      border: none;
      color: var(--gray-text);
      font-size: 13px;
      cursor: pointer;
      padding: 8px;
    }

    .quiz-back-btn:disabled {
      visibility: hidden;
    }

    .quiz-next-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    /* Results */
    .quiz-results {
      max-width: 900px;
      margin: -40px auto 80px;
      padding: 0 5%;
      text-align: center;
      animation: quizFadeUp 0.5s ease;
    }

    @keyframes quizFadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .quiz-results-icon {
      font-size: 48px;
      animation: sparklePop 0.6s ease;
    }

    @keyframes sparklePop {
      0% {
        opacity: 0;
        transform: scale(0.3);
      }
      60% {
        opacity: 1;
        transform: scale(1.2);
      }
      100% {
        transform: scale(1);
      }
    }

    .quiz-results h2 {
      font-family: var(--font-serif);
      font-size: 30px;
      color: var(--dark);
      margin: 12px 0 16px;
    }

    .quiz-answer-tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-bottom: 40px;
    }

    .quiz-answer-tag {
      background: var(--blush);
      color: var(--dark);
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 20px;
    }

    .quiz-results-actions {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-top: 40px;
      flex-wrap: wrap;
    }

    .quiz-retake-btn {
      background: none;
      border: 1.5px solid var(--rose);
      color: var(--dark);
      padding: 12px 28px;
      border-radius: 4px;
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: var(--transition);
    }

    .quiz-retake-btn:hover {
      border-color: var(--mauve);
      background: var(--blush);
    }

    .quiz-browse-link {
      font-size: 12px;
      letter-spacing: 1px;
      color: var(--gray-text);
      text-decoration: underline;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <!-- Navbar (rendered by components.js) -->
  <div id="navbar-placeholder"></div>

  <!-- Quiz Hero -->
  <section class="quiz-hero">
    <span class="hero-tag">PERSONALIZED FOR YOU</span>
    <h1>Find Your Perfect Routine</h1>
    <p>Answer 5 quick questions and we'll recommend the best products for your skin</p>
  </section>

  <!-- Quiz Container -->
  <div class="quiz-container" id="quiz-container">
    <div class="quiz-progress-label" id="quiz-progress-label">Question 1 of 5</div>
    <div class="quiz-progress-bar">
      <div class="quiz-progress-fill" id="quiz-progress-fill"></div>
    </div>

    <div id="quiz-questions"></div>

    <div class="quiz-nav">
      <button class="quiz-back-btn" id="quiz-back-btn" disabled>← Back</button>
      <button class="btn-primary quiz-next-btn" id="quiz-next-btn" disabled>Next →</button>
    </div>
  </div>

  <!-- Results -->
  <section class="quiz-results" id="quiz-results" style="display: none;">
    <div class="quiz-results-icon">✨</div>
    <h2>Your Skin Profile</h2>
    <div class="quiz-answer-tags" id="quiz-answer-tags"></div>

    <div class="section-header">
      <span class="section-tag">Curated For You</span>
      <h2 class="section-title">Recommended for You</h2>
    </div>

    <div class="products-grid" id="quiz-recommendations">
      <p>Loading recommendations...</p>
    </div>

    <div class="quiz-results-actions">
      <button class="quiz-retake-btn" id="quiz-retake-btn">Retake Quiz</button>
      <a href="/index.html" class="quiz-browse-link">Browse All Products</a>
    </div>
  </section>

  <!-- Footer (rendered by components.js) -->
  <div id="footer-placeholder"></div>

  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    /* ============================================================
       Quiz data
       ============================================================ */
    const QUESTIONS = [
      {
        title: "What's your skin type?",
        key: 'skinType',
        options: [
          { emoji: '🌊', title: 'Oily', subtitle: 'Shiny, enlarged pores', value: 'oily' },
          { emoji: '🌸', title: 'Dry', subtitle: 'Tight, flaky, dull', value: 'dry' },
          { emoji: '🌿', title: 'Combination', subtitle: 'Oily T-zone, dry cheeks', value: 'combination' },
          { emoji: '✨', title: 'Normal', subtitle: 'Balanced, few concerns', value: 'normal' },
        ],
      },
      {
        title: "What's your main skin concern?",
        key: 'concern',
        options: [
          { emoji: '🔴', title: 'Acne & Breakouts', subtitle: '', value: 'acne' },
          { emoji: '🌑', title: 'Dark Spots & Uneven Tone', subtitle: '', value: 'darkspots' },
          { emoji: '⏰', title: 'Fine Lines & Aging', subtitle: '', value: 'aging' },
          { emoji: '💧', title: 'Dryness & Dehydration', subtitle: '', value: 'dryness' },
        ],
      },
      {
        title: 'How sensitive is your skin?',
        key: 'sensitivity',
        options: [
          { emoji: '🌡️', title: 'Very Sensitive', subtitle: 'Reacts to most products', value: 'very' },
          { emoji: '😌', title: 'Somewhat Sensitive', subtitle: 'Occasional reactions', value: 'somewhat' },
          { emoji: '💪', title: 'Not Sensitive', subtitle: 'Can handle most products', value: 'not' },
          { emoji: '🤷', title: 'Not Sure', subtitle: '', value: 'unsure' },
        ],
      },
      {
        title: "What's your skincare goal?",
        key: 'goal',
        options: [
          { emoji: '✨', title: 'Glow & Radiance', subtitle: '', value: 'glow' },
          { emoji: '🛡️', title: 'Protection & Prevention', subtitle: '', value: 'protection' },
          { emoji: '💦', title: 'Hydration & Plumping', subtitle: '', value: 'hydration' },
          { emoji: '🎯', title: 'Target Specific Issues', subtitle: '', value: 'target' },
        ],
      },
      {
        title: 'How much time do you spend on skincare?',
        key: 'time',
        options: [
          { emoji: '⚡', title: '2 minutes', subtitle: 'Cleanser + moisturizer only', value: '2min' },
          { emoji: '🌿', title: '5 minutes', subtitle: 'Basic routine', value: '5min' },
          { emoji: '💅', title: '10 minutes', subtitle: 'Full routine', value: '10min' },
          { emoji: '👑', title: '15+ minutes', subtitle: 'I love skincare!', value: '15min' },
        ],
      },
    ];

    const answers = {};
    let currentQuestion = 1;

    /* ============================================================
       Wishlist helpers (for renderProductCard)
       ============================================================ */
    function getWishlist() {
      return JSON.parse(localStorage.getItem('wishlist')) || [];
    }

    function toggleWishlist(id) {
      let wishlist = getWishlist();

      if (wishlist.includes(id)) {
        wishlist = wishlist.filter((w) => w !== id);
      } else {
        wishlist.push(id);
      }

      localStorage.setItem('wishlist', JSON.stringify(wishlist));
      return wishlist.includes(id);
    }

    /* ============================================================
       Stock badge
       ============================================================ */
    function getStockBadge(stock) {
      if (stock === 0) {
        return `<span style="
          position: absolute; bottom: 12px; left: 12px;
          background: #c0392b; color: white;
          font-size: 10px; letter-spacing: 1px;
          padding: 4px 10px; border-radius: 20px;
          text-transform: uppercase;
        ">Out of Stock</span>`;
      } else if (stock <= 5) {
        return `<span style="
          position: absolute; bottom: 12px; left: 12px;
          background: #e8a87c; color: white;
          font-size: 10px; letter-spacing: 1px;
          padding: 4px 10px; border-radius: 20px;
          text-transform: uppercase;
          animation: pulse 1.5s ease infinite;
        ">Only ${stock} left!</span>`;
      }
      return '';
    }

    /* ============================================================
       Product card renderer (same style as homepage)
       ============================================================ */
    function renderProductCard(product) {
      const wishlist = getWishlist();
      const isWishlisted = wishlist.includes(product._id);

      return `
        <div class="product-card" data-id="${product._id}">
          <div class="product-img-wrap">
            <img src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=500&q=80&auto=format&fit=crop'" />
            <button class="product-wishlist ${isWishlisted ? 'active' : ''}" data-id="${product._id}" aria-label="Wishlist">
              <svg class="wishlist-heart-icon" viewBox="0 0 24 24"><path d="M19.5 12.572 12 20l-7.5-7.428A5 5 0 1 1 12 6.06a5 5 0 1 1 7.5 6.512z"/></svg>
            </button>
            ${getStockBadge(product.stock)}
          </div>
          <div class="product-info">
            <span class="product-category">${product.category}</span>
            <h3 class="product-name">${product.name}</h3>
            <span class="product-price">$${product.price.toFixed(2)}</span>
            <button class="btn-mauve product-add-btn" data-id="${product._id}" ${product.stock === 0 ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}>${product.stock === 0 ? 'Out of Stock' : 'Add to Cart'}</button>
          </div>
        </div>
      `;
    }

    function wireProductEvents(grid, list) {
      grid.querySelectorAll('.product-card').forEach((card) => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.product-wishlist') || e.target.closest('.product-add-btn')) return;
          window.location.href = `/product.html?id=${card.dataset.id}`;
        });
      });

      grid.querySelectorAll('.product-wishlist').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          if (!isLoggedIn()) { showAuthModal(window.location.pathname); return; }
          const nowWishlisted = toggleWishlist(btn.dataset.id);
          btn.classList.toggle('active', nowWishlisted);
          if (nowWishlisted) heartBurst(btn);
        });
      });

      grid.querySelectorAll('.product-add-btn').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const product = list.find((p) => p._id === btn.dataset.id);
          if (!product) return;

          addToCart(product, 1);

          const originalText = btn.textContent;
          btn.textContent = 'Added to cart!';
          btn.disabled = true;
          setTimeout(() => {
            btn.textContent = originalText;
            btn.disabled = false;
          }, 1000);
        });
      });
    }

    /* ============================================================
       Render questions
       ============================================================ */
    function renderQuestions() {
      const container = document.getElementById('quiz-questions');

      container.innerHTML = QUESTIONS.map((q, i) => `
        <div class="quiz-question ${i === 0 ? 'active' : ''}" data-question="${i + 1}">
          <h2>${q.title}</h2>
          <div class="quiz-options">
            ${q.options.map((opt) => `
              <div class="quiz-option" data-question="${i + 1}" data-value="${opt.value}">
                <span class="quiz-option-emoji">${opt.emoji}</span>
                <span class="quiz-option-text">
                  <strong>${opt.title}</strong>
                  ${opt.subtitle ? opt.subtitle : ''}
                </span>
                <span class="quiz-option-check">✓</span>
              </div>
            `).join('')}
          </div>
        </div>
      `).join('');

      container.querySelectorAll('.quiz-option').forEach((el) => {
        el.addEventListener('click', () => {
          const qNum = parseInt(el.dataset.question, 10);
          selectOption(qNum, el.dataset.value, el);
        });
      });
    }

    /* ============================================================
       Selection / navigation
       ============================================================ */
    function selectOption(questionNum, value, element) {
      const key = QUESTIONS[questionNum - 1].key;
      answers[key] = value;

      const questionEl = document.querySelector(`.quiz-question[data-question="${questionNum}"]`);
      questionEl.querySelectorAll('.quiz-option').forEach((opt) => opt.classList.remove('selected'));
      element.classList.add('selected');

      document.getElementById('quiz-next-btn').disabled = false;
    }

    function showQuestion(n) {
      currentQuestion = n;

      document.querySelectorAll('.quiz-question').forEach((q) => {
        q.classList.toggle('active', parseInt(q.dataset.question, 10) === n);
      });

      document.getElementById('quiz-progress-fill').style.width = `${n * 20}%`;
      document.getElementById('quiz-progress-label').textContent = `Question ${n} of 5`;

      document.getElementById('quiz-back-btn').disabled = n === 1;

      const key = QUESTIONS[n - 1].key;
      const nextBtn = document.getElementById('quiz-next-btn');
      nextBtn.disabled = !answers[key];
      nextBtn.textContent = n === 5 ? 'See My Results ✨' : 'Next →';
    }

    function nextQuestion() {
      if (currentQuestion < 5) {
        showQuestion(currentQuestion + 1);
      } else {
        showResults();
      }
    }

    function backQuestion() {
      if (currentQuestion > 1) {
        showQuestion(currentQuestion - 1);
      }
    }

    document.getElementById('quiz-next-btn').addEventListener('click', nextQuestion);
    document.getElementById('quiz-back-btn').addEventListener('click', backQuestion);

    /* ============================================================
       Results
       ============================================================ */
    function answerLabel(key, value) {
      const question = QUESTIONS.find((q) => q.key === key);
      const option = question.options.find((o) => o.value === value);
      return `${option.emoji} ${option.title}`;
    }

    function showResults() {
      document.getElementById('quiz-container').style.display = 'none';

      const resultsSection = document.getElementById('quiz-results');
      resultsSection.style.display = 'block';

      const tagsContainer = document.getElementById('quiz-answer-tags');
      tagsContainer.innerHTML = Object.entries(answers)
        .map(([key, value]) => `<span class="quiz-answer-tag">${answerLabel(key, value)}</span>`)
        .join('');

      getRecommendations(answers);
    }

    function resetQuiz() {
      Object.keys(answers).forEach((key) => delete answers[key]);

      document.querySelectorAll('.quiz-option').forEach((opt) => opt.classList.remove('selected'));
      document.getElementById('quiz-results').style.display = 'none';
      document.getElementById('quiz-container').style.display = 'block';

      showQuestion(1);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.getElementById('quiz-retake-btn').addEventListener('click', resetQuiz);

    /* ============================================================
       Recommendations
       ============================================================ */
    async function getRecommendations(answers) {
      const grid = document.getElementById('quiz-recommendations');

      try {
        const res = await fetch('/api/products');
        const allProducts = await res.json();

        const keywords = new Set();

        if (answers.skinType === 'oily' || answers.concern === 'acne') {
          keywords.add('cleanser');
          keywords.add('serum');
          keywords.add('sunscreen');
          keywords.add('spf');
        }

        if (answers.skinType === 'dry' || answers.concern === 'dryness') {
          keywords.add('body butter');
          keywords.add('body oil');
          keywords.add('bath salt');
          keywords.add('moisturizer');
        }

        if (answers.concern === 'darkspots') {
          keywords.add('vitamin c');
          keywords.add('rose hip');
        }

        if (answers.concern === 'aging') {
          keywords.add('retinol');
          keywords.add('serum');
        }

        if (answers.goal === 'glow') {
          keywords.add('glow body oil');
          keywords.add('vitamin c');
          keywords.add('rose hip');
        }

        if (answers.goal === 'hydration') {
          keywords.add('moisturizer');
          keywords.add('body butter');
          keywords.add('bath salt');
        }

        if (answers.goal === 'protection') {
          keywords.add('sunscreen');
          keywords.add('spf');
        }

        let recommended = allProducts.filter((p) => {
          const haystack = `${p.name} ${p.description}`.toLowerCase();
          return [...keywords].some((kw) => haystack.includes(kw));
        });

        if (!recommended.length) {
          recommended = allProducts.slice(0, 6);
        }

        recommended = recommended.slice(0, 6);

        if (!recommended.length) {
          grid.innerHTML = '<p>No recommendations found.</p>';
          return;
        }

        grid.innerHTML = recommended.map(renderProductCard).join('');
        wireProductEvents(grid, recommended);
      } catch (err) {
        grid.innerHTML = '<p>Failed to load recommendations.</p>';
        console.error('Error fetching recommendations:', err);
      }
    }

    /* ============================================================
       Init
       ============================================================ */
    renderQuestions();
    showQuestion(1);
    initNavbar();
    initFooter();
    updateCartCountUI();
  </script>
</body>
</html>
