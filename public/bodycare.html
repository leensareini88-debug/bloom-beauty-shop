<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Body Care | Bloom Beauty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    @keyframes shimmer {
      0% { background-position: -800px 0; }
      100% { background-position: 800px 0; }
    }
    .skeleton-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(196,145,127,0.1);
    }
    .skeleton-pulse {
      background: linear-gradient(
        90deg,
        #f5ede8 0%,
        #fdf8f5 40%,
        #f5ede8 80%
      );
      background-size: 800px 100%;
      animation: shimmer 1.6s ease-in-out infinite;
    }
    .skeleton-img {
      width: 100%;
      height: 240px;
    }
    .skeleton-line {
      height: 10px;
      border-radius: 20px;
      margin: 10px 16px 0;
    }
    .skeleton-line.short { width: 35%; }
    .skeleton-line.medium { width: 65%; }
    .skeleton-line.full {
      width: calc(100% - 32px);
      height: 36px;
      border-radius: 8px;
      margin-top: 12px;
      margin-bottom: 16px;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <!-- Navbar (rendered by components.js) -->
  <div id="navbar-placeholder"></div>

  <!-- Category Hero -->
  <section class="category-hero" style="background-image: url('https://images.unsplash.com/photo-1608248597279-f99d160bfcbc?w=1400');">
    <div class="category-hero-overlay"></div>
    <div class="hero-content">
      <span class="hero-tag">Bloom Beauty</span>
      <h1 class="hero-title">Body Care</h1>
      <p class="hero-subtitle">Scrubs, oils &amp; lotions for glowing skin</p>
    </div>
  </section>

  <!-- Breadcrumb -->
  <nav style="padding: 12px 5%; font-size: 12px; color: var(--gray-text);">
    <a href="/" style="color: var(--gray-text); text-decoration: none; transition: color 0.2s;"
      onmouseover="this.style.color='var(--brown)'" onmouseout="this.style.color='var(--gray-text)'">Home</a>
    <span style="margin: 0 8px; color: var(--gray-mid);">›</span>
    <span style="color: var(--dark);">Body Care</span>
  </nav>

  <!-- Filter & Sort Bar -->
  <div class="filter-sort-bar">
    <div class="filter-search">
      <input type="text" id="search-input" placeholder="Search body care products..." />
    </div>
    <select class="sort-select" id="sort-select">
      <option value="featured">Featured</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="newest">Newest</option>
    </select>
  </div>
  <p class="product-count" id="product-count">Showing 0 products</p>

  <!-- Products Grid -->
  <section style="padding: 24px 5% 80px;">
    <div class="products-grid" id="products-grid">
      <p>Loading products...</p>
    </div>
  </section>

  <!-- Skin Quiz Banner -->
  <a href="/quiz.html" style="
    display: block;
    background: var(--blush);
    text-align: center;
    padding: 24px 5%;
    color: var(--dark);
    text-decoration: none;
    font-size: 14px;
  ">
    Not sure which products suit you? Take our skin quiz for personalized recommendations →
  </a>

  <!-- Footer (rendered by components.js) -->
  <div id="footer-placeholder"></div>

  <!-- Quick View Modal -->
  <div id="quick-view-modal" style="
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(30,15,10,0.6);
    z-index: 9998;
    align-items: center;
    justify-content: center;
    padding: 20px;
  ">
    <div style="
      background: white;
      border-radius: 20px;
      max-width: 820px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      animation: slideUp 0.3s ease;
    ">
      <!-- Close button -->
      <button onclick="closeQuickView()" style="
        position: absolute;
        top: 16px;
        right: 16px;
        background: #fdf8f5;
        border: none;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        cursor: pointer;
        font-size: 18px;
        color: #3d2014;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
      ">&times;</button>

      <!-- Left: Product Image -->
      <div style="position: relative; border-radius: 20px 0 0 20px; overflow: hidden;">
        <img id="qv-image" src="" alt="" style="
          width: 100%;
          height: 100%;
          min-height: 400px;
          object-fit: cover;
        ">
        <span id="qv-category-badge" style="
          position: absolute;
          top: 16px;
          left: 16px;
          background: #c4917f;
          color: white;
          font-size: 11px;
          letter-spacing: 1.5px;
          text-transform: uppercase;
          padding: 5px 12px;
          border-radius: 20px;
        "></span>
      </div>

      <!-- Right: Product Info -->
      <div style="padding: 40px 36px; display: flex; flex-direction: column; justify-content: center;">
        <p id="qv-category" style="
          font-size: 11px;
          letter-spacing: 1.5px;
          text-transform: uppercase;
          color: #c4917f;
          margin-bottom: 8px;
        "></p>
        <h2 id="qv-name" style="
          font-family: 'Playfair Display', serif;
          font-size: 24px;
          color: #3d2014;
          margin-bottom: 12px;
          line-height: 1.3;
        "></h2>

        <!-- Stars -->
        <div style="color: #e8a87c; font-size: 14px; margin-bottom: 12px;">
          ★★★★★ <span style="color: #8a7060; font-size: 12px;">(24 reviews)</span>
        </div>

        <p id="qv-price" style="
          font-size: 22px;
          color: #7a4f3a;
          font-weight: 500;
          margin-bottom: 16px;
        "></p>

        <p id="qv-description" style="
          font-size: 13px;
          color: #8a7060;
          line-height: 1.7;
          margin-bottom: 20px;
        "></p>

        <div id="qv-ingredients"></div>

        <p id="qv-stock" style="
          font-size: 12px;
          margin-bottom: 20px;
        "></p>

        <!-- Quantity selector -->
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 20px;">
          <span style="font-size: 13px; color: #3d2014;">Qty:</span>
          <div style="display: flex; align-items: center; border: 1px solid #d4c5bc; border-radius: 24px; overflow: hidden;">
            <button onclick="qvChangeQty(-1)" style="
              background: none; border: none;
              width: 36px; height: 36px;
              cursor: pointer; font-size: 16px; color: #3d2014;
            ">&minus;</button>
            <input id="qv-qty" type="number" value="1" min="1" style="
              width: 40px; text-align: center; border: none;
              font-size: 14px; color: #3d2014; outline: none;
            ">
            <button onclick="qvChangeQty(1)" style="
              background: none; border: none;
              width: 36px; height: 36px;
              cursor: pointer; font-size: 16px; color: #3d2014;
            ">+</button>
          </div>
        </div>

        <!-- Buttons -->
        <button id="qv-add-cart" onclick="qvAddToCart()" style="
          background: #3d2014;
          color: white;
          border: none;
          padding: 14px;
          border-radius: 4px;
          font-size: 12px;
          letter-spacing: 2px;
          text-transform: uppercase;
          cursor: pointer;
          margin-bottom: 10px;
          transition: background 0.3s;
        ">Add to Cart</button>

        <button id="qv-add-wishlist" onclick="qvAddToWishlist()" style="
          background: transparent;
          color: #3d2014;
          border: 1.5px solid #c4917f;
          padding: 12px;
          border-radius: 4px;
          font-size: 12px;
          letter-spacing: 2px;
          text-transform: uppercase;
          cursor: pointer;
          margin-bottom: 16px;
          transition: all 0.3s;
        ">&#9825; Add to Wishlist</button>

        <a id="qv-view-full" href="#" style="
          text-align: center;
          font-size: 12px;
          color: #8a7060;
          text-decoration: underline;
          letter-spacing: 1px;
        ">View Full Details &rarr;</a>
      </div>
    </div>
  </div>

  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    let allProducts = [];


    /* ============================================================
       Stock badge
       ============================================================ */
    function getStockBadge(stock) {
      if (stock === 0) {
        return `<span style="
          position: absolute; bottom: 12px; left: 12px;
          background: #c0392b; color: white;
          font-size: 10px; letter-spacing: 1px;
          padding: 4px 10px; border-radius: 20px;
          text-transform: uppercase;
        ">Out of Stock</span>`;
      } else if (stock <= 5) {
        return `<span style="
          position: absolute; bottom: 12px; left: 12px;
          background: #e8a87c; color: white;
          font-size: 10px; letter-spacing: 1px;
          padding: 4px 10px; border-radius: 20px;
          text-transform: uppercase;
          animation: pulse 1.5s ease infinite;
        ">Only ${stock} left!</span>`;
      }
      return '';
    }

    /* ============================================================
       Product card renderer
       ============================================================ */
    function renderIngredientBadges(ingredients) {
      if (!ingredients || ingredients.length === 0) return '';
      return `
        <div class="ingredient-badges" style="display: flex; flex-wrap: wrap; gap: 4px;">
          ${ingredients.slice(0, 3).map(ing => `
            <span style="
              font-size: 9px;
              letter-spacing: 0.8px;
              text-transform: uppercase;
              color: #7a4f3a;
              background: #fdf8f5;
              border: 1px solid #e8ddd5;
              padding: 3px 8px;
              border-radius: 20px;
              white-space: nowrap;
            ">${ing}</span>
          `).join('')}
        </div>
      `;
    }

    function renderProductCard(product) {
      const inWishlist = isInWishlist(product._id);

      return `
        <div class="product-card" data-id="${product._id}">
          <div class="product-img-wrap">
            <img src="${product.image}" alt="${product.name}" loading="lazy" onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=500&q=80&auto=format&fit=crop'" />
            <button class="product-wishlist" data-id="${product._id}" aria-label="Wishlist"
              style="color: ${inWishlist ? '#c4917f' : 'inherit'};">
              ${inWishlist ? '♥' : '♡'}
            </button>
            <button class="quick-view-btn" onclick="openQuickView('${product._id}')">Quick View</button>
            ${getStockBadge(product.stock)}
          </div>
          <div class="product-info">
            <span class="product-category">${product.category}</span>
            <h3 class="product-name">${product.name}</h3>
            ${renderIngredientBadges(product.ingredients)}
            <span class="product-price">$${product.price.toFixed(2)}</span>
            <button class="btn-mauve product-add-btn" data-id="${product._id}" ${product.stock === 0 ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : ''}>${product.stock === 0 ? 'Out of Stock' : 'Add to Cart'}</button>
          </div>
        </div>
      `;
    }

    /* ============================================================
       Render products grid
       ============================================================ */
    function renderProducts(list) {
      const grid = document.getElementById('products-grid');
      const count = document.getElementById('product-count');

      count.textContent = `Showing ${list.length} product${list.length === 1 ? '' : 's'}`;

      if (list.length === 0) {
        grid.innerHTML = '<div class="empty-state">No products found.</div>';
        return;
      }

      grid.innerHTML = list.map(renderProductCard).join('');
      wireProductEvents(grid, list);
    }

    function wireProductEvents(grid, list) {
      grid.querySelectorAll('.product-card').forEach((card) => {
        card.addEventListener('click', (e) => {
          if (e.target.closest('.product-wishlist') || e.target.closest('.product-add-btn') || e.target.closest('.quick-view-btn')) return;
          window.location.href = `/product.html?id=${card.dataset.id}`;
        });
      });

      grid.querySelectorAll('.product-wishlist').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const product = list.find((p) => p._id === btn.dataset.id);
          if (!product) return;
          const added = toggleWishlist(product);
          btn.innerHTML = added ? '♥' : '♡';
          btn.style.color = added ? '#c4917f' : '';
          if (added) heartBurst(btn);
          updateWishlistCountUI();
        });
      });

      grid.querySelectorAll('.product-add-btn').forEach((btn) => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const product = list.find((p) => p._id === btn.dataset.id);
          if (!product) return;

          addToCart(product, 1);

          const originalText = btn.textContent;
          btn.textContent = 'Added to cart!';
          btn.disabled = true;
          setTimeout(() => {
            btn.textContent = originalText;
            btn.disabled = false;
          }, 1000);
        });
      });
    }

    /* ============================================================
       Filtering & sorting
       ============================================================ */
    function applyFiltersAndSort() {
      const query = document.getElementById('search-input').value.trim().toLowerCase();
      const sort = document.getElementById('sort-select').value;

      let filtered = allProducts.filter((p) => p.name.toLowerCase().includes(query));

      switch (sort) {
        case 'price-asc':
          filtered = filtered.slice().sort((a, b) => a.price - b.price);
          break;
        case 'price-desc':
          filtered = filtered.slice().sort((a, b) => b.price - a.price);
          break;
        case 'newest':
          filtered = filtered.slice().sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          break;
        default:
          break;
      }

      renderProducts(filtered);
    }

    document.getElementById('search-input').addEventListener('input', applyFiltersAndSort);
    document.getElementById('sort-select').addEventListener('change', applyFiltersAndSort);

    /* ============================================================
       Skeleton loading
       ============================================================ */
    function showSkeletons(count = 8) {
      const grid = document.getElementById('products-grid');
      if (!grid) return;
      grid.innerHTML = Array(count).fill(`
        <div class="skeleton-card">
          <div class="skeleton-img skeleton-pulse"></div>
          <div style="padding:4px 0 0;">
            <div class="skeleton-line short skeleton-pulse"></div>
            <div class="skeleton-line medium skeleton-pulse" style="margin-top:8px;"></div>
            <div class="skeleton-line full skeleton-pulse"></div>
          </div>
        </div>
      `).join('');
    }

    /* ============================================================
       Fetch products
       ============================================================ */
    async function fetchProducts() {
      const grid = document.getElementById('products-grid');
      showSkeletons();

      try {
        const res = await fetch('/api/products?category=' + encodeURIComponent('Body Care'));
        allProducts = await res.json();
        renderProducts(allProducts);
      } catch (err) {
        grid.innerHTML = '<div class="empty-state">Failed to load products.</div>';
        console.error('Error fetching products:', err);
      }
    }

    /* ============================================================
       Quick View
       ============================================================ */
    let currentQVProduct = null;

    function openQuickView(productId) {
      const product = allProducts.find((p) => p._id === productId);
      if (!product) return;
      currentQVProduct = product;

      const qvImage = document.getElementById('qv-image');
      qvImage.onerror = function() {
        this.onerror = null;
        this.src = 'https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=500&q=80&auto=format&fit=crop';
      };
      qvImage.src = product.image;
      qvImage.alt = product.name;
      document.getElementById('qv-category').textContent = product.category;
      document.getElementById('qv-category-badge').textContent = product.category;
      document.getElementById('qv-name').textContent = product.name;
      document.getElementById('qv-price').textContent = '$' + product.price.toFixed(2);
      document.getElementById('qv-description').textContent = product.description;
      const badgesContainer = document.getElementById('qv-ingredients');
      if (badgesContainer) {
        badgesContainer.innerHTML = renderIngredientBadges(product.ingredients);
      }
      document.getElementById('qv-qty').max = product.stock;
      document.getElementById('qv-qty').value = 1;
      document.getElementById('qv-view-full').href = '/product.html?id=' + product._id;

      const isWishlisted = isInWishlist(product._id);
      document.getElementById('qv-add-wishlist').textContent = isWishlisted ? '♥ Added to Wishlist' : '♡ Add to Wishlist';

      const stockEl = document.getElementById('qv-stock');
      if (product.stock > 5) {
        stockEl.innerHTML = '<span style="color:#6b8f71">● In Stock</span>';
      } else if (product.stock > 0) {
        stockEl.innerHTML = '<span style="color:#e8a87c">● Only ' + product.stock + ' left!</span>';
      } else {
        stockEl.innerHTML = '<span style="color:#c0392b">● Out of Stock</span>';
      }

      const modal = document.getElementById('quick-view-modal');
      modal.style.display = 'flex';
      document.body.style.overflow = 'hidden';
    }

    function closeQuickView() {
      document.getElementById('quick-view-modal').style.display = 'none';
      document.body.style.overflow = '';
      currentQVProduct = null;
    }

    function qvChangeQty(delta) {
      const input = document.getElementById('qv-qty');
      const max = currentQVProduct ? currentQVProduct.stock : 99;
      let val = parseInt(input.value, 10) + delta;
      val = Math.min(Math.max(val, 1), max);
      input.value = val;
    }

    function qvAddToCart() {
      if (!currentQVProduct) return;
      if (!isLoggedIn()) { showAuthModal(window.location.pathname); return; }

      const qty = parseInt(document.getElementById('qv-qty').value, 10) || 1;
      addToCart(currentQVProduct, qty);

      const btn = document.getElementById('qv-add-cart');
      const originalText = btn.textContent;
      btn.textContent = 'Added! ✓';
      btn.style.background = 'var(--success)';
      setTimeout(() => {
        btn.textContent = originalText;
        btn.style.background = '#3d2014';
      }, 1500);
    }

    function qvAddToWishlist() {
      if (!currentQVProduct) return;
      if (!isLoggedIn()) { showAuthModal(window.location.pathname); return; }

      const nowWishlisted = toggleWishlist(currentQVProduct);
      document.getElementById('qv-add-wishlist').textContent = nowWishlisted ? '♥ Added to Wishlist' : '♡ Add to Wishlist';

      document.querySelectorAll(`.product-wishlist[data-id="${currentQVProduct._id}"]`).forEach((cardBtn) => {
        cardBtn.innerHTML = nowWishlisted ? '♥' : '♡';
        cardBtn.style.color = nowWishlisted ? '#c4917f' : '';
      });

      if (nowWishlisted) heartBurst(document.getElementById('qv-add-wishlist'));
    }

    document.getElementById('quick-view-modal').addEventListener('click', (e) => {
      if (e.target.id === 'quick-view-modal') closeQuickView();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeQuickView();
    });

    /* ============================================================
       Init
       ============================================================ */
    initNavbar();
    initFooter();
    updateCartCountUI();
    fetchProducts();
  </script>
</body>
</html>
