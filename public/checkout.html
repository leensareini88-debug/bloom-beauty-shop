<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom Beauty - Checkout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .checkout-input {
      padding: 12px 16px;
      border: 1px solid #e8ddd5;
      border-radius: 8px;
      font-size: 14px;
      color: #3d2014;
      font-family: 'Inter', sans-serif;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    .checkout-input:focus {
      border-color: #c4917f;
      box-shadow: 0 0 0 3px rgba(196,145,127,0.1);
    }
    .checkout-input.input-error {
      border-color: #c0392b;
    }
    .checkout-label {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #8a7060;
      display: block;
      margin-bottom: 6px;
    }
    .payment-card {
      border: 1.5px solid #e8ddd5;
      border-radius: 12px;
      padding: 16px 20px;
      cursor: pointer;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: all 0.2s;
      background: white;
    }
    .payment-card.active {
      border-color: #3d2014;
      background: #fdf8f5;
    }
    .payment-card input[type="radio"] {
      accent-color: #3d2014;
    }
    .field-error {
      font-size: 11px;
      color: #c0392b;
      margin-top: 4px;
      min-height: 16px;
    }
    .api-error {
      font-size: 12px;
      color: #c0392b;
      text-align: center;
      margin-top: 8px;
    }

    @media (max-width: 768px) {
      .checkout-grid {
        grid-template-columns: 1fr !important;
        gap: 20px !important;
      }
      .order-summary-card {
        order: -1 !important;
        position: static !important;
      }
      .checkout-grid {
        padding: 20px 16px !important;
      }
      .page-title {
        font-size: 24px !important;
        margin-bottom: 20px !important;
      }
      .form-row {
        grid-template-columns: 1fr !important;
      }
      .payment-card {
        padding: 14px 16px !important;
      }
      #place-order-btn {
        padding: 14px !important;
        font-size: 12px !important;
      }
      #card-fields > div:last-child {
        grid-template-columns: 1fr !important;
      }
    }

    @media (max-width: 480px) {
      .checkout-grid {
        padding: 16px 12px !important;
      }
      .form-card {
        padding: 20px 16px !important;
        border-radius: 12px !important;
      }
      .order-summary-card {
        padding: 20px 16px !important;
        border-radius: 12px !important;
      }
    }
  </style>
</head>
<body style="background: #fdf8f5;">
  <div id="navbar-placeholder"></div>

  <h1 class="page-title">Checkout</h1>

  <div class="checkout-grid" style="
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 32px;
    align-items: start;
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 5% 80px;
  ">
    <!-- Left: Form -->
    <div class="form-card" style="
      background: white;
      border-radius: 16px;
      padding: 32px;
      border: 1px solid #f0e8e3;
      box-shadow: 0 4px 20px rgba(122,79,58,0.06);
    ">
      <form id="checkout-form" novalidate>
        <!-- Shipping Information -->
        <h2 style="font-family:'Playfair Display',serif;
          font-size:20px; color:#3d2014; margin-bottom:24px;
          padding-bottom:16px; border-bottom:1px solid #f0e8e3;">
          Shipping Information
        </h2>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
          <div>
            <label class="checkout-label" for="full-name">Full Name</label>
            <input type="text" id="full-name" class="checkout-input" />
            <p class="field-error" id="full-name-error"></p>
          </div>
          <div>
            <label class="checkout-label" for="email">Email</label>
            <input type="email" id="email" class="checkout-input" />
            <p class="field-error" id="email-error"></p>
          </div>
        </div>

        <div style="margin-bottom:16px;">
          <label class="checkout-label" for="phone">Phone</label>
          <input type="tel" id="phone" class="checkout-input" />
          <p class="field-error" id="phone-error"></p>
        </div>

        <div style="margin-bottom:16px;">
          <label class="checkout-label" for="street">Street Address</label>
          <input type="text" id="street" class="checkout-input" />
          <p class="field-error" id="street-error"></p>
        </div>

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px;">
          <div>
            <label class="checkout-label" for="city">City</label>
            <input type="text" id="city" class="checkout-input" />
            <p class="field-error" id="city-error"></p>
          </div>
          <div>
            <label class="checkout-label" for="country">Country</label>
            <input type="text" id="country" class="checkout-input" />
            <p class="field-error" id="country-error"></p>
          </div>
        </div>

        <!-- Payment Method -->
        <div style="margin-top:28px; padding-top:28px; border-top:1px solid #f0e8e3;">
          <h3 style="font-family:'Playfair Display',serif;
            font-size:20px; color:#3d2014; margin-bottom:20px;">
            Payment Method
          </h3>

          <label class="payment-card active" id="payment-option-card">
            <input type="radio" name="payment-method" value="card" checked />
            <div style="flex:1;">
              <div style="font-size:14px; color:#3d2014; font-weight:500;">Credit Card</div>
              <div style="font-size:11px; color:#8a7060; margin-top:2px;">Pay securely with your card</div>
            </div>
            <div style="display:flex; gap:6px;">
              <span style="font-size:9px; letter-spacing:0.5px; padding:3px 8px;
                background:#1a1f71; color:white; border-radius:4px; font-weight:600;">VISA</span>
              <span style="font-size:9px; letter-spacing:0.5px; padding:3px 8px;
                background:#eb001b; color:white; border-radius:4px; font-weight:600;">Mastercard</span>
            </div>
          </label>

          <label class="payment-card" id="payment-option-cod">
            <input type="radio" name="payment-method" value="cod" />
            <div style="flex:1;">
              <div style="font-size:14px; color:#3d2014; font-weight:500;">Cash on Delivery</div>
              <div style="font-size:11px; color:#8a7060; margin-top:2px;">Pay when you receive your order</div>
            </div>
          </label>

          <div id="card-fields" style="margin-top:16px;">
            <div style="margin-bottom:16px;">
              <label class="checkout-label" for="card-number">Card Number</label>
              <input type="text" id="card-number" class="checkout-input" placeholder="1234 5678 9012 3456" />
              <p class="field-error" id="card-number-error"></p>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
              <div>
                <label class="checkout-label" for="card-expiry">Expiry Date</label>
                <input type="text" id="card-expiry" class="checkout-input" placeholder="MM/YY" />
                <p class="field-error" id="card-expiry-error"></p>
              </div>
              <div>
                <label class="checkout-label" for="card-cvv">CVV</label>
                <input type="text" id="card-cvv" class="checkout-input" placeholder="123" />
                <p class="field-error" id="card-cvv-error"></p>
              </div>
            </div>
          </div>

          <div id="cod-message" style="display:none; padding:16px 20px;
            background:#f5fff8; border-radius:10px; border:1px solid #d4e8d9;
            font-size:13px; color:#3d6b4f; margin-top:12px;">
            <i class="ti ti-cash" style="margin-right:6px;"></i>
            Your order will be collected upon delivery
          </div>
        </div>
      </form>
    </div>

    <!-- Right: Order Summary -->
    <div>
      <div class="order-summary-card" style="
        background: white;
        border-radius: 16px;
        padding: 28px;
        border: 1px solid #f0e8e3;
        box-shadow: 0 4px 20px rgba(122,79,58,0.06);
        position: sticky;
        top: 100px;
      ">
        <h3 style="font-family:'Playfair Display',serif;
          font-size:20px; color:#3d2014; margin-bottom:24px;
          padding-bottom:16px; border-bottom:1px solid #f0e8e3;">
          Order Summary
        </h3>

        <div id="checkout-summary-items"></div>

        <div style="display:flex; justify-content:space-between;
          font-size:13px; color:#8a7060; margin-bottom:10px; margin-top:16px;">
          <span>Subtotal</span>
          <span id="summary-subtotal" style="color:#3d2014;">$0.00</span>
        </div>
        <div style="display:flex; justify-content:space-between;
          font-size:13px; color:#8a7060; margin-bottom:10px;">
          <span>Shipping</span>
          <span id="summary-shipping" style="color:#3d2014;">$0.00</span>
        </div>

        <div style="display:flex; justify-content:space-between;
          font-size:17px; font-weight:500; color:#3d2014;
          margin:20px 0; padding-top:16px; border-top:1px solid #f0e8e3;">
          <span>Total</span>
          <span id="summary-total" style="color:#c4917f;">$0.00</span>
        </div>

        <button type="submit" form="checkout-form" id="place-order-btn" style="
          background:#3d2014; color:white; width:100%;
          padding:16px; border:none; border-radius:4px;
          font-size:12px; letter-spacing:2px;
          text-transform:uppercase; cursor:pointer;
          transition:background 0.3s; margin-bottom:12px;
        " onmouseover="this.style.background='#7a4f3a'"
          onmouseout="this.style.background='#3d2014'">
          Place Order
        </button>
        <p class="api-error" id="api-error"></p>

        <div style="display:flex; align-items:center;
          justify-content:center; gap:6px;
          font-size:11px; color:#8a7060; margin-top:12px;">
          <i class="ti ti-lock" style="font-size:14px;"></i>
          <span>Secure 256-bit SSL encryption</span>
        </div>
      </div>
    </div>
  </div>

  <div id="footer-placeholder"></div>

  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    /* ============================================================
       Auth + cart guards
       ============================================================ */
    const token = localStorage.getItem('token');

    if (!token) {
      window.location.href = 'login.html?message=' + encodeURIComponent('Please login to checkout');
    }

    const cart = getCart();

    if (!cart.length) {
      window.location.href = 'cart.html';
    }

    /* ============================================================
       Order summary
       ============================================================ */
    const FREE_SHIPPING_THRESHOLD = 75;
    const SHIPPING_COST = 9.99;

    function renderSummary() {
      const summaryItems = document.getElementById('checkout-summary-items');

      summaryItems.innerHTML = cart.map(item => `
        <div style="display:flex; align-items:center; gap:12px;
          padding:12px 0; border-bottom:1px solid #f9f4f1;">
          <img src="${item.image}" alt="${item.name}" style="
            width:56px; height:56px; object-fit:cover;
            border-radius:8px; flex-shrink:0;
          " onerror="this.onerror=null;this.src='https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?w=200&q=80&auto=format&fit=crop'">
          <div style="flex:1;">
            <div style="font-size:14px; color:#3d2014;">${item.name}</div>
            <div style="font-size:12px; color:#8a7060;">Qty: ${item.quantity}</div>
          </div>
          <div style="font-size:14px; color:#3d2014; font-weight:500; flex-shrink:0;">
            $${(item.price * item.quantity).toFixed(2)}
          </div>
        </div>
      `).join('');

      const subtotal = getCartTotal();
      const shipping = subtotal >= FREE_SHIPPING_THRESHOLD ? 0 : SHIPPING_COST;
      const total = subtotal + shipping;

      document.getElementById('summary-subtotal').textContent = '$' + subtotal.toFixed(2);
      document.getElementById('summary-shipping').textContent = shipping === 0 ? 'Free' : '$' + shipping.toFixed(2);
      document.getElementById('summary-total').textContent = '$' + total.toFixed(2);
    }

    /* ============================================================
       Payment method toggle
       ============================================================ */
    const paymentOptionCard = document.getElementById('payment-option-card');
    const paymentOptionCod = document.getElementById('payment-option-cod');
    const cardFields = document.getElementById('card-fields');
    const codMessage = document.getElementById('cod-message');

    function updatePaymentMethod() {
      const selected = document.querySelector('input[name="payment-method"]:checked').value;

      paymentOptionCard.classList.toggle('active', selected === 'card');
      paymentOptionCod.classList.toggle('active', selected === 'cod');
      cardFields.style.display = selected === 'card' ? 'block' : 'none';
      codMessage.style.display = selected === 'cod' ? 'block' : 'none';
    }

    document.querySelectorAll('input[name="payment-method"]').forEach(input => {
      input.addEventListener('change', updatePaymentMethod);
    });

    /* ============================================================
       Validation
       ============================================================ */
    function setError(inputId, errorId, message) {
      const input = document.getElementById(inputId);
      const error = document.getElementById(errorId);
      if (error) error.textContent = message;
      if (input) input.classList.toggle('input-error', !!message);
    }

    function isValidEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function validateForm() {
      const fullName = document.getElementById('full-name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const street = document.getElementById('street').value.trim();
      const city = document.getElementById('city').value.trim();
      const country = document.getElementById('country').value.trim();
      const paymentMethod = document.querySelector('input[name="payment-method"]:checked').value;

      let isValid = true;

      ['full-name', 'email', 'phone', 'street', 'city', 'country', 'card-number', 'card-expiry', 'card-cvv'].forEach(id => {
        setError(id, id + '-error', '');
      });

      if (!fullName) { setError('full-name', 'full-name-error', 'Full name is required'); isValid = false; }
      if (!email) { setError('email', 'email-error', 'Email is required'); isValid = false; }
      else if (!isValidEmail(email)) { setError('email', 'email-error', 'Enter a valid email'); isValid = false; }
      if (!phone) { setError('phone', 'phone-error', 'Phone number is required'); isValid = false; }
      if (!street) { setError('street', 'street-error', 'Street address is required'); isValid = false; }
      if (!city) { setError('city', 'city-error', 'City is required'); isValid = false; }
      if (!country) { setError('country', 'country-error', 'Country is required'); isValid = false; }

      if (paymentMethod === 'card') {
        const cardNumber = document.getElementById('card-number').value.trim();
        const cardExpiry = document.getElementById('card-expiry').value.trim();
        const cardCvv = document.getElementById('card-cvv').value.trim();

        if (!cardNumber) { setError('card-number', 'card-number-error', 'Card number is required'); isValid = false; }
        if (!cardExpiry) { setError('card-expiry', 'card-expiry-error', 'Expiry date is required'); isValid = false; }
        if (!cardCvv) { setError('card-cvv', 'card-cvv-error', 'CVV is required'); isValid = false; }
      }

      return { isValid, street, city, country };
    }

    /* ============================================================
       Submit
       ============================================================ */
    document.getElementById('checkout-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const apiError = document.getElementById('api-error');
      apiError.textContent = '';

      const { isValid, street, city, country } = validateForm();

      if (!isValid) return;

      const placeOrderBtn = document.getElementById('place-order-btn');
      placeOrderBtn.disabled = true;

      try {
        const res = await fetch('/api/orders', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: 'Bearer ' + token,
          },
          body: JSON.stringify({
            items: cart.map(item => ({ product: item._id, quantity: item.quantity })),
            shippingAddress: { street, city, country },
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          throw new Error(data.message || 'Failed to place order');
        }

        localStorage.removeItem('cart');
        window.location.href = 'order-confirmation.html?id=' + data._id;
      } catch (err) {
        apiError.textContent = err.message;
        placeOrderBtn.disabled = false;
      }
    });

    /* ============================================================
       Init
       ============================================================ */
    initNavbar();
    initFooter();
    updateCartCountUI();
    renderSummary();
  </script>
</body>
</html>
