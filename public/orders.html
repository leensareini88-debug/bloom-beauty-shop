<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom Beauty - My Orders</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- Navbar (rendered by components.js) -->
  <div id="navbar-placeholder"></div>

  <h1 class="page-title">My Orders</h1>

  <section class="orders-section">
    <div id="orders-container">
      <p style="text-align: center; color: var(--gray-text); padding: 60px 0;">Loading orders...</p>
    </div>
  </section>

  <!-- Footer (rendered by components.js) -->
  <div id="footer-placeholder"></div>

  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    /* ============================================================
       Auth guard
       ============================================================ */
    const token = localStorage.getItem('token');

    if (!token) {
      window.location.href = 'login.html';
    }

    /* ============================================================
       Orders
       ============================================================ */
    const ordersContainer = document.getElementById('orders-container');

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
      });
    }

    function renderOrders(orders) {
      if (!orders.length) {
        ordersContainer.innerHTML = `
          <div class="orders-empty">
            <i class="ti ti-package"></i>
            <p>You haven't placed any orders yet.</p>
            <a href="index.html#products" class="btn-primary">Start Shopping</a>
          </div>
        `;
        return;
      }

      ordersContainer.innerHTML = `
        <div class="orders-list">
          ${orders
            .map((order) => {
              const itemsHtml = order.items
                .map(
                  (item) => `
                    <div class="order-card-item">
                      <img src="${item.product.image}" alt="${item.product.name}" />
                      <div class="order-card-item-details">
                        <h4>${item.product.name}</h4>
                        <span>Qty: ${item.quantity}</span>
                      </div>
                      <div class="order-card-item-price">$${(item.price * item.quantity).toFixed(2)}</div>
                    </div>
                  `
                )
                .join('');

              return `
                <div class="order-card">
                  <div class="order-card-header">
                    <span><strong>Order #${order._id.slice(-8)}</strong> &middot; ${formatDate(order.createdAt)}</span>
                    <span class="status-badge status-${order.status}">${order.status}</span>
                  </div>
                  ${itemsHtml}
                  <div class="order-card-footer">
                    <span class="order-card-total">Total: $${order.totalPrice.toFixed(2)}</span>
                    <button class="btn-outline view-details-btn" data-id="${order._id}">View Details</button>
                  </div>
                </div>
              `;
            })
            .join('')}
        </div>
      `;

      ordersContainer.querySelectorAll('.view-details-btn').forEach((btn) => {
        btn.addEventListener('click', () => {
          window.location.href = `order-confirmation.html?id=${btn.dataset.id}`;
        });
      });
    }

    async function fetchOrders() {
      try {
        const res = await fetch('/api/orders/myorders', {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (!res.ok) {
          ordersContainer.innerHTML = '<p style="text-align: center; color: var(--gray-text); padding: 60px 0;">Failed to load orders.</p>';
          return;
        }

        const orders = await res.json();
        renderOrders(orders);
      } catch (err) {
        ordersContainer.innerHTML = '<p style="text-align: center; color: var(--gray-text); padding: 60px 0;">Failed to load orders.</p>';
        console.error('Error fetching orders:', err);
      }
    }

    /* ============================================================
       Init
       ============================================================ */
    initNavbar();
    initFooter();
    updateCartCountUI();
    fetchOrders();
  </script>
</body>
</html>
