<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloom Beauty - Order Confirmed</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- Navbar (rendered by components.js) -->
  <div id="navbar-placeholder"></div>

  <!-- Confirmation -->
  <section class="confirmation-section" id="confirmation-section">
    <p style="text-align: center; color: var(--gray-text); padding: 60px 0;">Loading order...</p>
  </section>

  <!-- Footer (rendered by components.js) -->
  <div id="footer-placeholder"></div>

  <script src="/js/cart.js"></script>
  <script src="/js/components.js"></script>
  <script>
    /* ============================================================
       Order confirmation
       ============================================================ */
    const confirmationSection = document.getElementById('confirmation-section');

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
      });
    }

    function renderOrder(order) {
      const user = JSON.parse(localStorage.getItem('user'));
      const userName = user ? user.name : 'there';

      const itemsHtml = order.items
        .map(
          (item) => `
            <div class="order-card-item">
              <img src="${item.product.image}" alt="${item.product.name}" />
              <div class="order-card-item-details">
                <h4>${item.product.name}</h4>
                <span>Qty: ${item.quantity}</span>
              </div>
              <div class="order-card-item-price">$${(item.price * item.quantity).toFixed(2)}</div>
            </div>
          `
        )
        .join('');

      confirmationSection.innerHTML = `
        <div class="confirmation-checkmark">
          <i class="ti ti-check"></i>
        </div>
        <h1 class="confirmation-title">Order Confirmed!</h1>
        <p class="confirmation-subtitle">Thank you ${userName}, your order is on its way!</p>

        <div class="order-detail-card">
          <div class="order-detail-header">
            <h3>Order #${order._id.slice(-8)}</h3>
            <span class="order-detail-date">${formatDate(order.createdAt)}</span>
            <span class="status-badge status-${order.status}">${order.status}</span>
          </div>

          <div class="order-detail-section-title">Items</div>
          ${itemsHtml}

          <div class="order-detail-section-title">Shipping Address</div>
          <p class="shipping-address-text">
            ${order.shippingAddress.street}<br />
            ${order.shippingAddress.city}, ${order.shippingAddress.country}
          </p>

          <div class="order-detail-total">
            <span>Total</span>
            <span>$${order.totalPrice.toFixed(2)}</span>
          </div>
        </div>

        <div class="confirmation-actions">
          <a href="index.html" class="btn-outline">Continue Shopping</a>
          <a href="orders.html" class="btn-primary">View All Orders</a>
        </div>
      `;
    }

    async function fetchOrder() {
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      const token = localStorage.getItem('token');

      if (!id) {
        confirmationSection.innerHTML = '<p style="text-align: center; color: var(--gray-text); padding: 60px 0;">No order specified.</p>';
        return;
      }

      if (!token) {
        window.location.href = 'login.html';
        return;
      }

      try {
        const res = await fetch(`/api/orders/${id}`, {
          headers: { Authorization: `Bearer ${token}` },
        });

        if (!res.ok) {
          confirmationSection.innerHTML = '<p style="text-align: center; color: var(--gray-text); padding: 60px 0;">Order not found.</p>';
          return;
        }

        const order = await res.json();
        renderOrder(order);
      } catch (err) {
        confirmationSection.innerHTML = '<p style="text-align: center; color: var(--gray-text); padding: 60px 0;">Failed to load order.</p>';
        console.error('Error fetching order:', err);
      }
    }

    /* ============================================================
       Init
       ============================================================ */
    initNavbar();
    initFooter();
    updateCartCountUI();
    fetchOrder();
  </script>
</body>
</html>
